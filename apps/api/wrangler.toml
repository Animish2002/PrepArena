# ── Deployment checklist ──────────────────────────────────────────────────────
# Production domain : https://prep-arena.animishchopade.in
# API worker        : https://preparena-api.animishchopade123.workers.dev
#
# Before redeploying, make sure these Cloudflare settings are in place:
#   1. Google Cloud Console → Authorised redirect URIs includes:
#        https://preparena-api.animishchopade123.workers.dev/auth/google/callback
#   2. Google Cloud Console → Authorised JavaScript origins includes:
#        https://prep-arena.animishchopade.in
#   3. Cloudflare Pages → preparena-web → Settings → Custom domains:
#        prep-arena.animishchopade.in   (with CNAME pointing to pages.dev)
#   4. Secrets pushed via wrangler CLI (never commit these):
#        wrangler secret put JWT_SECRET
#        wrangler secret put GOOGLE_CLIENT_ID
#        wrangler secret put GOOGLE_CLIENT_SECRET
#        wrangler secret put INTERNAL_SECRET
#        wrangler secret put ADMIN_KEY
#        wrangler secret put INTERNAL_KEY
#
# Deploy commands:
#   API  : npm run deploy:api   (runs: wrangler deploy src/index.ts)
#   Web  : npm run deploy:web   (runs: vite build && wrangler pages deploy)
#
# Local dev — create apps/api/.dev.vars (gitignored):
#   FRONTEND_URL=http://localhost:5173
#   JWT_SECRET=any-random-string
#   GOOGLE_CLIENT_ID=your-google-client-id
#   GOOGLE_CLIENT_SECRET=your-google-client-secret
#   GOOGLE_REDIRECT_URI=http://localhost:8787/auth/google/callback
#   INTERNAL_SECRET=any-random-string
#   WORKER_URL=http://localhost:8787
# ─────────────────────────────────────────────────────────────────────────────

name = "preparena-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "deaaf7f664dbc73849bfef93d8f21b2d"

[[d1_databases]]
binding = "DB"
database_name = "preParena-db"
database_id = "90b18472-18ea-4d6b-becd-7a70e837e20f"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "KV"
id = "dd6f22111ddf40bbb7e6e5bf870396e3"

[[r2_buckets]]
binding = "R2"
bucket_name = "preparena-storage"

# ── Durable Objects ───────────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "USER_FEED",   class_name = "UserFeed" },
  { name = "BATTLE_ROOM", class_name = "BattleRoom" },
  { name = "CHAT_ROOM",   class_name = "ChatRoom" },
]

# new_sqlite_classes required for Cloudflare free plan
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserFeed", "BattleRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ChatRoom"]

# ── Cron triggers ─────────────────────────────────────────────────────────────
[triggers]
crons = ["0 0 * * 1"]  # every Monday 00:00 UTC — auto-generate weekly challenge

# ── Vars (production values — overridden by .dev.vars for local dev) ──────────
[vars]
FRONTEND_URL        = "https://prep-arena.animishchopade.in"
GOOGLE_REDIRECT_URI = "https://preparena-api.animishchopade123.workers.dev/auth/google/callback"
WORKER_URL          = "https://preparena-api.animishchopade123.workers.dev"

# ── Named production environment (deploy with: wrangler deploy --env production)
[env.production.vars]
FRONTEND_URL        = "https://prep-arena.animishchopade.in"
GOOGLE_REDIRECT_URI = "https://preparena-api.animishchopade123.workers.dev/auth/google/callback"
WORKER_URL          = "https://preparena-api.animishchopade123.workers.dev"