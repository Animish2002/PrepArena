name = "preparena-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "deaaf7f664dbc73849bfef93d8f21b2d"

[[d1_databases]]
binding = "DB"
database_name = "preParena-db"
database_id = "90b18472-18ea-4d6b-becd-7a70e837e20f"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "KV"
id = "dd6f22111ddf40bbb7e6e5bf870396e3"

[[r2_buckets]]
binding = "R2"
bucket_name = "preparena-storage"

# ── Durable Objects ───────────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "USER_FEED",   class_name = "UserFeed" },
  { name = "BATTLE_ROOM", class_name = "BattleRoom" },
]

# new_sqlite_classes required for Cloudflare free plan
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserFeed", "BattleRoom"]

# ── Vars (production values — overridden by .dev.vars for local dev) ──────────
[vars]
FRONTEND_URL        = "https://preparena-web.pages.dev"
GOOGLE_REDIRECT_URI = "https://preparena-api.animishchopade123.workers.dev/auth/google/callback"
WORKER_URL          = "https://preparena-api.animishchopade123.workers.dev"

# ── Secrets — push via CLI, never hardcode here ───────────────────────────────
# Run once:
#   wrangler secret put JWT_SECRET
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put INTERNAL_SECRET
#
# For local dev create apps/api/.dev.vars (gitignored) with:
#   JWT_SECRET=any-random-string
#   GOOGLE_CLIENT_ID=your-google-client-id
#   GOOGLE_CLIENT_SECRET=your-google-client-secret
#   INTERNAL_SECRET=any-random-string
